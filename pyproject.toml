[project]
name = "hyperiax"
authors = [
  { name="Stefan Sommer", email="sommer@di.ku.dk" },
  { name="Marcus Holte Teller", email="marcus@di.ku.dk" },
  { name="Gefan Yang", email="***@di.ku.dk" },
  { name="Michael Baand Severinsen", email="***@di.ku.dk" },
  { name="Morten Akhøj Pedersen", email="***@di.ku.dk" },
  { name="Nicklas Boserup", email="***@di.ku.dk" }
]
description = "Tree traversals using JAX"
readme = "README.md"
requires-python = ">=3.8"
classifiers = [
    "Programming Language :: Python :: 3",
    "License :: OSI Approved :: Apache Software License",
    "Operating System :: OS Independent",
]
dependencies = [
    "jax",
    "jaxlib",
    "tqdm",
]
dynamic = ["version"]

[project.optional-dependencies]
examples = [
    "jaxdifferentialgeometry",
    "ipykernel",
    "jupyter",
    "matplotlib",
    "nbclient",
    "nbconvert",
    "pandas",
    "plotly",
]
dev = [
    "black",
    "flake8",
    "pytest",
]
doc = [
    "sphinx-rtd-theme",
    "sphinx-autodoc-annotation",
    "nbsphinx",
    "markupsafe==2.0.1",
    "ipython",
]

[project.urls]
Homepage = "https://github.com/computationalevolutionarymorphometry/hyperiax"
Issues = "https://github.com/computationalevolutionarymorphometry/hyperiax/issues"

[build-system]
requires = [
    "setuptools>=60",
    "setuptools-scm>=8.0",
]
build-backend = "setuptools.build_meta"

[tool.setuptools_scm]
version_file = "hyperiax/_version.py"

[tool.setuptools.packages.find]
where = ["."]

[tool.black]
line-length = 88
target-version = ["py38"]
extend-exclude = [
    "/docs/source/generated",
    "/docs/_build",
    "/legacy",
]

[tool.flake8]
max-line-length = 88
extend-ignore = [
    "E203",
    "W503",
]
exclude = [
    "docs/_build",
    "docs/source/generated",
    "build",
    "dist",
    "legacy",
    "__pycache__",
]
