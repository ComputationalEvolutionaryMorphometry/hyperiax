[project]
name = "hyperiax"
authors = [
  { name = "Stefan Sommer", email = "sommer@di.ku.dk" },
  { name = "Marcus Holte Teller", email = "marcus@di.ku.dk" },
  { name = "Gefan Yang", email = "***@di.ku.dk" },
  { name = "Michael Baand Severinsen", email = "***@di.ku.dk" },
  { name = "Morten Akhøj Pedersen", email = "***@di.ku.dk" },
  { name = "Nicklas Boserup", email = "***@di.ku.dk" },
]
description = "Tree traversals using JAX"
readme = "README.md"
requires-python = ">=3.11"
classifiers = [
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "License :: OSI Approved :: Apache Software License",
    "Operating System :: OS Independent",
]
dependencies = [
    "jax>=0.4.30",
    "jaxlib>=0.4.30",
    "numpy>=1.26",
]
dynamic = ["version"]

[project.optional-dependencies]
# Newick I/O + phylo tree visualization (ete3).
io = [
    "ete3>=3.1",
    "six",  # ete3 still uses it on some platforms
]
# Shape / LDDMM prebuilt models (trimesh for mesh sphere, etc.).
prebuilt-shape = [
    "trimesh>=4.0",
]
# BFFG prebuilt models — diffrax powers the ODE-integrated backward
# filter; the closed-form path doesn't need it.
prebuilt-bffg = [
    "diffrax>=0.6",
]
# Notebook tutorials in docs/source/notebooks/.
# Install via:   uv sync --group notebooks
notebooks = [
    "matplotlib>=3.8",
    "jupyter>=1.0",
    "ipykernel>=6.29",
    "diffrax>=0.6",
    "jax-tqdm>=0.4",
    "joblib>=1.4",
    "optax>=0.2",
]

[project.urls]
Homepage = "https://github.com/computationalevolutionarymorphometry/hyperiax"
Issues = "https://github.com/computationalevolutionarymorphometry/hyperiax/issues"

[build-system]
requires = [
    "setuptools>=68",
    "setuptools-scm>=8.0",
]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
include = ["hyperiax*"]

[tool.setuptools_scm]
version_file = "hyperiax/_version.py"

# ── uv-specific configuration ─────────────────────────────────────────────
# Dev-only dependencies (PEP 735 dependency groups).
# Install via:   uv sync --group dev
# All extras:    uv sync --all-extras --group dev
[dependency-groups]
dev = [
    "pytest>=8",
    "pytest-xdist>=3",
]

[tool.uv]
# Pin a single resolution across all extras so toggling --extra doesn't churn the lockfile.
required-version = ">=0.4"

# ── pytest ────────────────────────────────────────────────────────────────
[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = ["-ra", "--strict-markers"]
