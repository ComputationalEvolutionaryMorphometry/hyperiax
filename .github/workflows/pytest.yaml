name: Test

on:
  push:
    branches: [main, v3]
  pull_request:
    branches: [main, v3]

jobs:
  test:
    name: pytest (uv, Python 3.11)
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Install uv
      uses: astral-sh/setup-uv@v4
      with:
        enable-cache: true

    - name: Sync project (all extras + dev group)
      run: uv sync --all-extras --group dev

    - name: Run tests
      run: uv run pytest
