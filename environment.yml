# Conda environment for hyperiax (full developer setup).
#
# Usage:
#   conda env create -f environment.yml
#   conda activate hyperiax
#
# For a minimal end-user install instead, create a bare env and use pip:
#   conda create -n hyperiax python=3.12
#   conda activate hyperiax
#   pip install -e .                       # core only
#   pip install -e '.[prebuilt]'           # with prebuilt models
#
# Notes:
# - Python is the only thing we let conda manage; everything else comes from
#   PyPI via pip to keep parity with the uv-managed setup. Mixing conda-forge
#   JAX with PyPI diffrax/equinox tends to produce ABI mismatches.
# - `pip install -e .` picks up the version from setuptools-scm (git tags).
name: hyperiax
channels:
  - conda-forge
dependencies:
  - python=3.12
  - pip
  - pip:
      - -r requirements/dev.txt
      - -e .
